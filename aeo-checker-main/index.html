<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AEO Checker</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tiny.cloud/1/tsww03jhsecz22u9fvkmqt7dz1gmrbsuykh24q2i717p66ar/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
  <script src="https://cdn.jsdelivr.net/npm/mark.js/dist/mark.min.js"></script>
</head>
<body>
  <div class="layout">
    <main class="chat-container">
      <div id="docArea" class="chat-area"></div>
    </main>
    <div id="sidebar-resizer" class="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar" tabindex="0"></div>
    <aside class="side-panel">
      <!-- Settings Panel -->
      <div class="settings-panel">
        <button id="settings-toggle" class="settings-toggle">
          <span id="settings-label">View settings</span>
          <span id="settings-count" class="settings-count">(6 checks enabled)</span>
        </button>
        
        <div id="settings-content" class="settings-content" style="display: none;">
          <div class="settings-controls">
            <button id="check-all" class="settings-button">Check All</button>
            <button id="uncheck-all" class="settings-button">Uncheck All</button>
          </div>
          
          <div class="settings-item">
            <input type="checkbox" id="check-plagiarism" class="settings-checkbox" checked>
            <label for="check-plagiarism" class="settings-label">
              <span class="settings-primary">Check plagiarism</span>
              <span class="settings-sublabel">Highlight potential overlaps with external sources.</span>
            </label>
          </div>
          
          <div class="settings-item">
            <input type="checkbox" id="check-legal" class="settings-checkbox" checked>
            <label for="check-legal" class="settings-label">
              <span class="settings-primary">Check legal review</span>
              <span class="settings-sublabel">Flag terms that require a legal pass.</span>
            </label>
          </div>
          
          <div class="settings-item">
            <input type="checkbox" id="check-links" class="settings-checkbox" checked>
            <label for="check-links" class="settings-label">
              <span class="settings-primary">Check broken links</span>
              <span class="settings-sublabel">Test outbound links for 200/OK.</span>
            </label>
          </div>
          
          <div class="settings-item">
            <input type="checkbox" id="check-vague" class="settings-checkbox" checked>
            <label for="check-vague" class="settings-label">
              <span class="settings-primary">Scan for vague sentences</span>
              <span class="settings-sublabel">Find sentences likely needing simplification.</span>
            </label>
          </div>
          
          <div class="settings-item">
            <input type="checkbox" id="check-mentions" class="settings-checkbox" checked>
            <label for="check-mentions" class="settings-label">
              <span class="settings-primary">Check for HubSpot Mentions</span>
              <span class="settings-sublabel">Compare draft against intent/targets.</span>
            </label>
          </div>
          
          <div class="settings-item">
            <input type="checkbox" id="check-design" class="settings-checkbox" checked>
            <label for="check-design" class="settings-label">
              <span class="settings-primary">Check design elements</span>
              <span class="settings-sublabel">FAQ, semantic headings, TL;DR, TOC, tables.</span>
            </label>
          </div>
        </div>
      </div>
      
      <!-- Action Buttons -->
      <div style="display: flex; gap: 10px; width: 100%;">
        <button id="scan-document" class="btn btn-primary" style="flex: 1;">Scan document</button>
        <button id="clear-results" class="btn" style="flex: 1;">Clear results</button>
      </div>
      
      <!-- Progress Panel -->
      <div id="progress-panel" class="progress-panel" style="display: none;">
        <div id="progress-content"></div>
        <div id="scan-summary" class="scan-summary"></div>
      </div>
      
      <!-- Results Panel -->
      <div id="results-panel" class="results-panel" style="display: none;">
        <div id="results-content" class="results-content"></div>
      </div>
    </aside>
  </div>

  <script type="module" src="public/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuzzysort@3.1.0/fuzzysort.min.js"></script>
</body>
</html>
